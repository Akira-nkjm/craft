name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, labeled]

jobs:
  review:
    if: |
      github.event.pull_request.draft == false &&
      (
        github.event.action == 'opened' ||
        github.event.action == 'reopened' ||
        (github.event.action == 'labeled' && github.event.label.name == 'claude-review')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: |
            --allowed-tools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(git log:*),Bash(git diff:*)"
          prompt: |
            Review pull request #${{ github.event.pull_request.number }}.

            Steps:
            1. `gh pr diff ${{ github.event.pull_request.number }}` で差分を取得
            2. 変更ファイルを Read で読む（diff だけでなく前後の文脈も）
            3. PR が `Closes #N` を含むなら `gh issue view N` で要件を確認
            4. AGENTS.md と RULES.md を必要なら参照

            最後に `mcp__github_comment__update_claude_comment` ツールでレビュー結果を
            tracking comment に書き込む。フォーマット:

            ```
            ## 🔍 Code Review

            **何が変わったか**: 1 文

            ### 🔴 Critical (あれば、なければセクション省略)
            - file:line — 問題と修正案

            ### 🟡 Suggestions (3-5 件まで、優先度順、なければ省略)
            - file:line — 改善提案

            ### 🟢 良い点
            - 簡潔に

            **判断**: approve / request-changes / comment
            ```

            指示:
            - 簡潔。lint レベル指摘はスキップ。design / correctness にフォーカス
            - file:line 形式で参照
            - 推測ではなく差分の根拠を示す
