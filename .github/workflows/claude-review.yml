name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, labeled]

jobs:
  review:
    if: |
      github.event.pull_request.draft == false &&
      (
        github.event.action == 'opened' ||
        github.event.action == 'reopened' ||
        (github.event.action == 'labeled' && github.event.label.name == 'claude-review')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request thoroughly. Read AGENTS.md, RULES.md, SOUL.md,
            and the relevant files in .claude/rules/ first to understand the
            project conventions.

            For each file changed in this PR:
            - Read the full context (not just the diff)
            - Use codegraph_* MCP tools if available for structural understanding
            - Check against project conventions in .claude/rules/

            Post a single summary review comment covering:
            1. **何が変わったか** (brief)
            2. **🔴 Critical issues** if any (correctness, security, layer violation)
            3. **🟡 Suggestions** for improvement (3-5 max, prioritized)
            4. **🟢 What's done well** (acknowledge good patterns)
            5. **承認判断**: approve / request-changes / comment

            Be concise. Reference specific line numbers with file paths.
            Skip lint-level nits. Focus on design and correctness.
            If the PR closes an issue, verify it actually addresses the
            requirements in that issue.
