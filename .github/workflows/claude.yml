name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude-implement') ||
      (github.event_name == 'issues' && github.event.action == 'opened' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: claude-implement
          # No `prompt:` — let the action auto-detect tag mode from @claude mentions /
          # claude-implement label. Tag mode creates a tracking comment and reads CLAUDE.md
          # for project conventions automatically.

      - name: Auto-create PR for new claude branch
        if: |
          (github.event_name == 'issue_comment' && github.event.issue.pull_request == null) ||
          (github.event_name == 'issues')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          BRANCH=$(gh api "repos/${GITHUB_REPOSITORY}/branches" --paginate \
            --jq ".[] | select(.name | startswith(\"claude/issue-${ISSUE_NUMBER}-\")) | .name" \
            | sort -r | head -1)
          if [ -z "$BRANCH" ]; then
            echo "::notice::No claude/issue-${ISSUE_NUMBER}-* branch found, skipping PR creation"
            exit 0
          fi
          echo "Found branch: $BRANCH"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            echo "::notice::PR #$EXISTING already exists for branch $BRANCH"
            exit 0
          fi
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq .title)
          BODY=$(printf 'Closes #%s\n\nAuto-created by Claude Code GitHub Action from `@claude` mention on #%s.\n\nSee the issue for full context and the discussion thread for implementation details.\n\n🤖 Generated with Claude Code' "$ISSUE_NUMBER" "$ISSUE_NUMBER")
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body "$BODY")
          PR_NUM=$(basename "$PR_URL")
          # Chain a review by mentioning @claude on the new PR
          gh pr comment "$PR_NUM" --body "@claude review この PR を簡潔にレビューしてください。差分を読んで、🔴 critical / 🟡 suggestions / 🟢 良い点 / 承認判断 を 1 コメントにまとめてください。"
