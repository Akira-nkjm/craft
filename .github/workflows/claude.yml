name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude-implement') ||
      (github.event_name == 'issues' && github.event.action == 'opened' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.14 (for just check)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install just
        uses: taiki-e/install-action@just

      - name: Resolve base branch from issue body (zipper chain)
        id: base
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -e
          # Parse "Base: #N" or "Base: <branch>" from issue body
          BASE_LINE=$(printf '%s\n' "$ISSUE_BODY" | grep -oE '^Base: .*$' | head -1 || true)
          BASE_BRANCH=""
          if [ -n "$BASE_LINE" ]; then
            BASE_VAL=$(printf '%s' "$BASE_LINE" | sed -E 's/^Base: //')
            if [[ "$BASE_VAL" =~ ^#([0-9]+)$ ]]; then
              BASE_ISSUE="${BASH_REMATCH[1]}"
              # Find the open PR's head branch for that issue
              BASE_BRANCH=$(gh pr list --state open --search "linked:issue $BASE_ISSUE" --json headRefName --jq '.[0].headRefName' 2>/dev/null || true)
              if [ -z "$BASE_BRANCH" ]; then
                # fall back to "Closes #N" search on open PR bodies
                BASE_BRANCH=$(gh pr list --state open --json number,body,headRefName \
                  --jq ".[] | select(.body | contains(\"Closes #${BASE_ISSUE}\")) | .headRefName" | head -1)
              fi
            else
              # literal branch name
              BASE_BRANCH="$BASE_VAL"
            fi
          fi
          if [ -z "$BASE_BRANCH" ]; then
            BASE_BRANCH="main"
          fi
          echo "name=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved base branch: $BASE_BRANCH"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: claude-implement
          base_branch: ${{ steps.base.outputs.name || 'main' }}
          # Pure tag mode. Lint/test gating happens in the safety net step
          # below, NOT inside Claude (passing custom claude_args has caused
          # multiple regressions: tools getting silently replaced, Claude
          # stopping without pushing, etc.).

      - name: Resolve claude branch
        id: branch
        if: |
          (github.event_name == 'issue_comment' && github.event.issue.pull_request == null) ||
          (github.event_name == 'issues')
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH=$(gh api "repos/${GITHUB_REPOSITORY}/branches" --paginate \
            --jq ".[] | select(.name | startswith(\"claude/issue-${ISSUE_NUMBER}-\")) | .name" \
            | sort -r | head -1)
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Re-checkout claude branch for safety net
        if: steps.branch.outputs.name != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 1

      - name: Validate branch passes `just check` (safety net)
        if: steps.branch.outputs.name != ''
        run: |
          set -e
          uv sync --all-extras --dev
          just check || (echo "::error::just check failed on ${{ steps.branch.outputs.name }} — PR creation skipped" && exit 1)
          uv run pytest -q || (echo "::error::pytest failed on ${{ steps.branch.outputs.name }} — PR creation skipped" && exit 1)

      - name: Auto-create PR for new claude branch
        if: |
          success() && (
            (github.event_name == 'issue_comment' && github.event.issue.pull_request == null) ||
            (github.event_name == 'issues')
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          BRANCH=$(gh api "repos/${GITHUB_REPOSITORY}/branches" --paginate \
            --jq ".[] | select(.name | startswith(\"claude/issue-${ISSUE_NUMBER}-\")) | .name" \
            | sort -r | head -1)
          if [ -z "$BRANCH" ]; then
            echo "::notice::No claude/issue-${ISSUE_NUMBER}-* branch found, skipping PR creation"
            exit 0
          fi
          echo "Found branch: $BRANCH"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            echo "::notice::PR #$EXISTING already exists for branch $BRANCH"
            exit 0
          fi
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq .title)
          BODY=$(printf 'Closes #%s\n\nAuto-created by Claude Code GitHub Action.\n\nNOTE: This PR was created by `GITHUB_TOKEN`, so CI and `@claude review` chains do NOT auto-fire. To run CI / request review, either close+reopen this PR, push an empty commit, or comment `@claude review` manually.\n\n🤖 Generated with Claude Code' "$ISSUE_NUMBER")
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body "$BODY")
          PR_NUM=$(basename "$PR_URL")
          # Force GitHub to re-parse the "Closes #N" keyword for issue linking.
          # Bot-created PRs sometimes skip the link; re-saving the body with a
          # trailing space triggers re-parsing.
          gh pr edit "$PR_NUM" --body "${BODY} " > /dev/null
          echo "::notice::Created PR #${PR_NUM} and refreshed for issue link"
