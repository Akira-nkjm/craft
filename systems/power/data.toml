# === Batteries (ASXB23004 × 1) ===
# コンポ管理 行: バッテリー/BAT, ASXB23004 (Astrex), 96.6 × 84 × 53 mm, 664g
# 8 直 3 並（中須賀研系の標準構成、GEO-X と同等）想定

[batteries.spec]
mass_kg = 0.664
temp_min_c = -10.0
temp_max_c = 45.0 # Li-ion 充電上限
capacity_wh = 80.0 # Astrex ASXB23004 概算（TBD: データシート要確認）
nominal_voltage_v = 28.0 # 8直 × 3.5V cell
manufacturer = "Astrex"

[batteries.main.design]
quantity = 1
depth_of_discharge = 0.3 # 蝕時間 ~21 min @ 14W ≈ 5Wh 放電、80Wh 容量で DoD ~6% → 安全側

[batteries.main.design.placement]
face = "MY"
u = 0.0
v = 0.0
w = 0.0
dx = 96.6
dy = 84.0
dz = 53.0
rz = 0.0
side = "IN"
cad_file = ""
cad_offset_x = 0.0
cad_offset_y = 0.0
cad_offset_z = 0.0
update_bbox = 0

[batteries.main.requirements]
depth_of_discharge_max = 0.5

[batteries.main.meta]
notes = "Astrex ASXB23004。子衛星 1 個構成。容量は要データシート確認"



# === Solar Panel (60 cells, MZ ボディマウント + PY 展開パネル) ===
# コンポ管理 行: 太陽電池 60枚 + 展開パネル 1
# Cell: SHARP 三接合, 37.8 × 76.4 mm, 0.00274 m²/cell, 28% efficiency
# 発生電力: 太陽指向時全日照 16.1W, 蝕最大 14.5W (子衛星発電量計算 variant 1)

[solar_panels.spec]
mass_kg = 0.003 # 1 cell あたり 3g
temp_min_c = -80.0
temp_max_c = 100.0
area_m2 = 0.00274 # 1 cell の面積
default_power_generation_per_unit_w = 0.27 # 16.1W / 60 cell ≈ 0.27W/cell
efficiency = 0.28 # SHARP triple-junction

[solar_panels.body_mz.design]
# MZ 面 BODY マウント 12 枚
