# Power system instance data
#
# 簡略形式: `<sub>.model.` プレフィックスは省略（merge 時に自動付与）
# shared_spec=True (MultiInstance): `[<plural>.spec]` に共有 spec、
# instance ごとには design / requirements / meta のみ



# === Batteries ===

[batteries.spec]
mass_kg = 0.0 # 質量 [kg]
temp_min_c = -20.0 # 動作温度下限 [degC]
temp_max_c = 60.0 # 動作温度上限 [degC]
capacity_wh = 100.0 # Battery capacity [Wh]
nominal_voltage_v = 3.7 # [V]
manufacturer = "Panasonic" # Manufacturer

[batteries.main.design]
quantity = 1 # 搭載個数
depth_of_discharge = 0.7 # 設計時 DoD

[batteries.main.requirements]
depth_of_discharge_max = 0.8 # 要求 DoD 上限

[batteries.main.meta]
notes = "選定理由: 過去ミッション実績"


[batteries.aux.design]
quantity = 1 # 搭載個数
depth_of_discharge = 0.6 # 設計時 DoD

[batteries.aux.requirements]
depth_of_discharge_max = 0.8 # 要求 DoD 上限



# === Solar Panel ===

[solar_panels.spec]
mass_kg = 0.0 # 質量 [kg]
temp_min_c = -100.0 # 動作温度下限 [degC]
temp_max_c = 120.0 # 動作温度上限 [degC]
area_m2 = 0.5 # Panel area [m^2]
default_power_generation_per_unit_w = 30.0 # 想定発電量 [W]
efficiency = 0.28 # セル効率

[solar_panels.main_paddle.design]
quantity = 1 # 搭載個数
cell_count = 32
string_count = 4



# === PDM ===

[pdms.spec]
mass_kg = 0.0 # 質量 [kg]
power_per_unit_w = 8.0 # 単位あたりの想定消費電力 [W]
rated_current_a = 5.0 # [A]

[pdms.main.design]
quantity = 1 # 搭載個数
efficiency = 0.95

[pdms.main.design.power_modes] # OperationMode 別の on/off
safe = true
nominal = true
science = true
safe_hold = false
