# Thermal system
# 簡略形式: `<sub>.model.` プレフィックス省略

# === Heater (MultiInstance, PowerConsuming) ===

[heaters.battery_pack.spec]
rated_power_w = 5.0
target_temperature_c = -10.0
default_power_consumption_per_unit_w = 5.0

[heaters.battery_pack.design]
hysteresis_c = 2.0

[heaters.battery_pack.design.power_modes]
safe = true
nominal = true
science = false
safe_hold = false


[heaters.obc_radiator.spec]
rated_power_w = 3.0
target_temperature_c = 5.0
default_power_consumption_per_unit_w = 3.0

[heaters.obc_radiator.design]
hysteresis_c = 1.5

[heaters.obc_radiator.design.power_modes]
safe = true
nominal = true
science = true
safe_hold = false


# === PanelSurface (MultiInstance, SpecOnly — Design なし) ===

[panel_surfaces.white_paint.spec]
emissivity = 0.9
absorptivity = 0.2
surface_treatment = "白塗装"

[panel_surfaces.mli.spec]
emissivity = 0.03
absorptivity = 0.4
surface_treatment = "MLI（多層断熱材）"
