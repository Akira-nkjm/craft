# Thermal system
#
# Source: SEIRIOS 子衛星 (shared drive: SEIRIOS)
#   - SEIRIOS_コンポ管理シート / 子衛星1
#   - 電源モード検討 / 子衛星電力消費 行6 (ヒーター = 2.0W, 蝕中のみ ON)



# === Heater (BAT 周りで safe 中保温) ===
# 子衛星電力消費 行6: ヒーター 2.0W, 蝕中の safe / sun_acq でのみ ON
# 簡略化: 子衛星単独 safe モード時に常時 ON（最悪蝕条件想定）

[heaters.battery_pack.spec]
power_per_unit_w = 2.0
rated_power_w = 2.0
target_temperature_c = -5.0 # ASXB23004 動作下限想定

[heaters.battery_pack.design]
quantity = 1
hysteresis_c = 2.0

[heaters.battery_pack.design.placement]
face = "MY"
u = 0.0
v = 0.0
w = 0.0
dx = 96.6
dy = 84.0
dz = 1.0
rz = 0.0
side = "IN"
cad_file = ""
cad_offset_x = 0.0
cad_offset_y = 0.0
cad_offset_z = 0.0
update_bbox = 0

[heaters.battery_pack.design.power_modes]
safe = true
sun_acquisition = false
coarse_3axis = false
fine_3axis = false
propulsion = false
mated_check = false
mated_calibration = false
mated_actuator = false
coarse_ff = false
fine_ff = false



# === Panel Surface (SAP / MLI / 構体白塗装) ===

[panel_surfaces.sap_cell.spec]
emissivity = 0.85 # GaAs 三接合セル表面 typical
absorptivity = 0.92 # AM0 吸収率
surface_treatment = "SHARP triple-junction cell"

[panel_surfaces.mli.spec]
emissivity = 0.03
absorptivity = 0.4
surface_treatment = "MLI（多層断熱材）"

[panel_surfaces.white_paint.spec]
emissivity = 0.9
absorptivity = 0.2
surface_treatment = "白塗装"
