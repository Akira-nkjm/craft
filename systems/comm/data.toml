dz = 16.0
rz = 0.0
side = "IN"
cad_file = ""
cad_offset_x = 0.0
cad_offset_y = 0.0
cad_offset_z = 0.0
update_bbox = 0

[transceivers.s_band_rx.design.power_modes]
