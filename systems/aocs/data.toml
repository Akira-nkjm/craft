# === Sun Sensor (nanoSSOC-D60 × 4) ===
# 子衛星電力消費 行17 / コンポ管理 行: サンセンサ/SS
# Model: nanoSSOC-D60 (SolarMems), 43 × 14 × 5.9 mm, 6.5g, 0.076W/個

[sun_sensers.spec]
mass_kg = 0.0065
power_per_unit_w = 0.076
fov_deg = 60.0 # nanoSSOC-D60 conical FOV ±60°

[sun_sensers.main.design]
quantity = 4 # PX/MX/PZ/MZ 4 面に分散

[sun_sensers.main.design.placement]
face = "PX"
u = 0.0
v = 0.0
w = 0.0
dx = 43.0
dy = 14.0
dz = 5.9
rz = 0.0
side = "OUT"
cad_file = ""
cad_offset_x = 0.0
cad_offset_y = 0.0
cad_offset_z = 0.0
update_bbox = 0

[sun_sensers.main.design.power_modes]
safe = false
sun_acquisition = true
coarse_3axis = true
fine_3axis = true
propulsion = true
mated_check = false
mated_calibration = false
mated_actuator = true
coarse_ff = true
fine_ff = true



