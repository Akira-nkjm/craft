# Power subsystem instance data
#
# 簡略形式: `<sub>.model.` プレフィックスは省略（merge 時に自動付与）
# shared_spec=True (MultiInstance): `[<plural>.spec]` に共有 spec、
# instance ごとには design / requirements / meta のみ

# === Batteries ===

[batteries.spec]                        # 全 instance 共通の spec
