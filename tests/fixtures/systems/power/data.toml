# Power system instance data
#
# 簡略形式: `<sub>.model.` プレフィックスは省略（merge 時に自動付与）
# shared_spec=True (MultiInstance): `[<plural>.spec]` に共有 spec、
# instance ごとには design / requirements / meta のみ



# === Batteries ===

[batteries.spec]
mass_kg = 0.0 # 質量 [kg]
temp_min_c = -20.0 # 動作温度下限 [degC]
temp_max_c = 60.0 # 動作温度上限 [degC]
capacity_wh = 100.0 # Battery capacity [Wh]
nominal_voltage_v = 3.7 # [V]
manufacturer = "Panasonic" # Manufacturer

[batteries.main.design]
quantity = 1 # 搭載個数
depth_of_discharge = 0.7 # 設計時 DoD

[batteries.main.design.placement] # 搭載位置・CAD パラメータ
face = "PX" # Panel face to mount on
u = 0.0 # Position along face u-axis [mm]
v = 0.0 # Position along face v-axis [mm]
w = 0.0 # Offset from face surface [mm]
dx = 0.0 # Bounding box x dimension [mm]
dy = 0.0 # Bounding box y dimension [mm]
dz = 0.0 # Bounding box z dimension [mm]
rz = 0.0 # Rotation around face normal [degrees]
side = "IN" # Mount on inner or outer face
cad_file = "" # CAD document name (empty = generate box)
cad_offset_x = 0.0 # CAD bounding box center offset x [mm]
cad_offset_y = 0.0 # CAD bounding box center offset y [mm]
cad_offset_z = 0.0 # CAD bounding box center offset z [mm]
update_bbox = 0 # Set to 1 to auto-update bbox from CAD

[batteries.main.requirements]
depth_of_discharge_max = 0.8 # 要求 DoD 上限

[batteries.main.meta]
notes = "選定理由: 過去ミッション実績"


[batteries.aux.design]
quantity = 1 # 搭載個数
depth_of_discharge = 0.6 # 設計時 DoD

[batteries.aux.design.placement] # 搭載位置・CAD パラメータ
face = "PX" # Panel face to mount on
u = 0.0 # Position along face u-axis [mm]
v = 0.0 # Position along face v-axis [mm]
w = 0.0 # Offset from face surface [mm]
dx = 0.0 # Bounding box x dimension [mm]
dy = 0.0 # Bounding box y dimension [mm]
dz = 0.0 # Bounding box z dimension [mm]
rz = 0.0 # Rotation around face normal [degrees]
side = "IN" # Mount on inner or outer face
cad_file = "" # CAD document name (empty = generate box)
cad_offset_x = 0.0 # CAD bounding box center offset x [mm]
cad_offset_y = 0.0 # CAD bounding box center offset y [mm]
cad_offset_z = 0.0 # CAD bounding box center offset z [mm]
update_bbox = 0 # Set to 1 to auto-update bbox from CAD

[batteries.aux.requirements]
depth_of_discharge_max = 0.8 # 要求 DoD 上限



# === Solar Panel ===

[solar_panels.spec]
mass_kg = 0.0 # 質量 [kg]
temp_min_c = -100.0 # 動作温度下限 [degC]
temp_max_c = 120.0 # 動作温度上限 [degC]
area_m2 = 0.5 # Panel area [m^2]
default_power_generation_per_unit_w = 30.0 # 想定発電量 [W]
efficiency = 0.28 # セル効率

[solar_panels.main_paddle.design]
quantity = 1 # 搭載個数
cell_count = 32
string_count = 4

[solar_panels.main_paddle.design.placement] # 搭載位置・CAD パラメータ
face = "PX" # Panel face to mount on
u = 0.0 # Position along face u-axis [mm]
v = 0.0 # Position along face v-axis [mm]
w = 0.0 # Offset from face surface [mm]
dx = 0.0 # Bounding box x dimension [mm]
dy = 0.0 # Bounding box y dimension [mm]
dz = 0.0 # Bounding box z dimension [mm]
rz = 0.0 # Rotation around face normal [degrees]
side = "IN" # Mount on inner or outer face
cad_file = "" # CAD document name (empty = generate box)
cad_offset_x = 0.0 # CAD bounding box center offset x [mm]
cad_offset_y = 0.0 # CAD bounding box center offset y [mm]
cad_offset_z = 0.0 # CAD bounding box center offset z [mm]
update_bbox = 0 # Set to 1 to auto-update bbox from CAD



# === PDM ===

[pdms.spec]
mass_kg = 0.0 # 質量 [kg]
power_per_unit_w = 8.0 # 単位あたりの想定消費電力 [W]
rated_current_a = 5.0 # [A]

[pdms.main.design]
quantity = 1 # 搭載個数
efficiency = 0.95

[pdms.main.design.placement] # 搭載位置・CAD パラメータ
face = "PX" # Panel face to mount on
u = 0.0 # Position along face u-axis [mm]
v = 0.0 # Position along face v-axis [mm]
w = 0.0 # Offset from face surface [mm]
dx = 0.0 # Bounding box x dimension [mm]
dy = 0.0 # Bounding box y dimension [mm]
dz = 0.0 # Bounding box z dimension [mm]
rz = 0.0 # Rotation around face normal [degrees]
side = "IN" # Mount on inner or outer face
cad_file = "" # CAD document name (empty = generate box)
cad_offset_x = 0.0 # CAD bounding box center offset x [mm]
cad_offset_y = 0.0 # CAD bounding box center offset y [mm]
cad_offset_z = 0.0 # CAD bounding box center offset z [mm]
update_bbox = 0 # Set to 1 to auto-update bbox from CAD

[pdms.main.design.power_modes] # OperationMode 別の on/off
safe = true
nominal = true
science = true
safe_hold = false
