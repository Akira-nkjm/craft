name: hook-absolute-path
description: フックスクリプトのパスは $CLAUDE_PROJECT_DIR で絶対化する
scope: project
confidence: high
observations: 1
created: 2026-05-26
updated: 2026-05-26
tags: [hooks, settings, claude-code]

trigger: |
  settings.local.json で hooks を新規定義するとき、
  または相対パス指定のフックでエラーが出たとき。

guidance: |
  hooks の command フィールドは必ず以下の形式にする:

      python3 $CLAUDE_PROJECT_DIR/.claude/tools/hooks/<script>.py

  相対パス (`python3 .claude/tools/hooks/...`) はエージェントが cd した瞬間に
  解決できなくなりフックが連鎖的に壊れる。

rationale: |
  Claude Code のフックは現在の作業ディレクトリ基準で解決されるため、
  エージェントが `cd .claude/skills` などした後にフックが起動すると
  `<wrong-cwd>/.claude/tools/hooks/<script>.py` を探しに行って失敗する。
  $CLAUDE_PROJECT_DIR はハーネスがプロジェクトルートに設定する標準環境変数。

examples:
  - context: dangerous_cmd.py のフックが ENOENT で連鎖失敗
    action: settings.local.json の command を $CLAUDE_PROJECT_DIR 付きに修正
    outcome: cwd に関係なくフックが安定動作
